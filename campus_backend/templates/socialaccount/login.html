{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in with Google | Campus Connect</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        /* Glassy effect */
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: inherit;
        filter: blur(18px) saturate(1.3);
        opacity: 0.7;
        z-index: 0;
      }
      .google-login-card {
        position: relative;
        z-index: 1;
        /* ...existing code... */
      }
      .google-login-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(80, 80, 180, 0.15);
        padding: 2.5rem 2rem 2rem 2rem;
        max-width: 350px;
        width: 100%;
        text-align: center;
      }
      .google-login-card img {
        width: 80px;
        margin-bottom: 1rem;
      }
      .google-login-card h2 {
        margin: 0 0 1rem 0;
        color: #222;
        font-weight: 700;
      }
      .google-login-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #4285f4;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 0.75rem 1.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin: 1.5rem 0 0 0;
        box-shadow: 0 2px 8px rgba(66, 133, 244, 0.08);
      }
      .google-login-btn:hover {
        background: #3367d6;
      }
      .google-login-btn i {
        font-size: 1.3rem;
      }
      .google-login-card p {
        color: #555;
        margin-top: 1rem;
        font-size: 0.98rem;
      }
    </style>
  </head>
  <body>
    <div class="google-login-card">
      <img src="/static/campus-connect-logo.jpg" alt="Campus Connect Logo" />
      <h2>Sign in with Google</h2>
      <form
        method="post"
        action=""
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          width: 100%;
        "
      >
        {% csrf_token %}
        <button type="submit" class="google-login-btn" style="margin: 0 auto">
          <i class="fab fa-google"></i> Continue with Google
        </button>
      </form>
      <p>
        Use your campus Google account to sign in.<br />Secure &amp; fast
        authentication.
      </p>
    </div>
  </body>
</html>
